<!DOCTYPE html>
<html lang="en">
<head>
    <title>the NBA house</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <img src="/static/definition_of_suvirr.png" alt="Logo" style="width:375px;height:100px; display:block; margin:auto;">
    <h2>Player statistics</h2>

    <div class="table-container">
        <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchTable()" />
        <table id="myTable" border="5">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Team</th>
                    <th>Points</th>
                    <th>Rebounds</th>
                    <th>Assists</th>
                    <th>Steals</th>
                    <th>Blocks</th>
                </tr>
            </thead>
            <tbody id="player-rows">
                <tr><td colspan="7">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const PLAYERS = [
            "Shai Gilgeous-Alexander",
            "Kevin Durant",
            "Nikola Jokic",
            "Stephen Curry",
            "LeBron James",
            "Anthony Edwards",
            "Tyrese Maxey",
            "Donovan Mitchell",
            "James Harden",
            "Victor Wembanyama",
        ];

        async function loadPlayers() {
            const tbody = document.getElementById('player-rows');
            tbody.innerHTML = '<tr><td colspan="7">Loading...</td></tr>';

            const rows = await Promise.all(PLAYERS.map(async (name) => {
                try {
                    const searchRes = await fetch(`/api/search?q=${encodeURIComponent(name)}`);
                    const results = await searchRes.json();
                    if (!results.length) return errorRow(name, 'Not found');

                    const id = results[0].id;

                    const [info, career] = await Promise.all([
                        fetch(`/api/player/${id}/info`).then(r => r.json()),
                        fetch(`/api/player/${id}/career`).then(r => r.json()),
                    ]);

                    const avg = careerAverage(career);

                    return `
                        <tr>
                            <td>
                                <img src="https://cdn.nba.com/headshots/nba/latest/1040x760/${id}.png"
                                     alt="${name}"
                                     style="width:100px;height:70px;object-fit:cover;vertical-align:middle;"
                                     onerror="this.style.display='none'">
                                ${name}
                            </td>
                            <td>${info.team || 'N/A'}</td>
                            <td>${avg.PTS}</td>
                            <td>${avg.REB}</td>
                            <td>${avg.AST}</td>
                            <td>${avg.STL}</td>
                            <td>${avg.BLK}</td>
                        </tr>
                    `;
                } catch (e) {
                    return errorRow(name, 'Error loading');
                }
            }));

            tbody.innerHTML = rows.join('');
        }

        function careerAverage(seasons) {
            if (!seasons.length) return { PTS: '—', REB: '—', AST: '—', STL: '—', BLK: '—' };
            const totalGP = seasons.reduce((sum, s) => sum + (s.GP || 0), 0);
            if (!totalGP) return { PTS: '—', REB: '—', AST: '—', STL: '—', BLK: '—' };
            const cols = ['PTS', 'REB', 'AST', 'STL', 'BLK'];
            const result = {};
            for (const col of cols) {
                const total = seasons.reduce((sum, s) => sum + (s[col] || 0), 0);
                result[col] = (total / totalGP).toFixed(1);
            }
            return result;
        }

        function errorRow(name, msg) {
            return `<tr><td>${name}</td><td colspan="6">${msg}</td></tr>`;
        }

        function searchTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const table = document.getElementById("myTable");
            const rows = table.getElementsByTagName("tr");

            for (let i = 1; i < rows.length; i++) {
                const cells = rows[i].getElementsByTagName("td");
                let match = false;
                for (let j = 0; j < cells.length; j++) {
                    if (cells[j].textContent.toLowerCase().includes(input)) {
                        match = true;
                        break;
                    }
                }
                rows[i].style.display = match ? "" : "none";
            }
        }

        loadPlayers();
    </script>
