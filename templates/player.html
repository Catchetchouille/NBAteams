<!DOCTYPE html>
<html lang="en">
<head>
    <title>the NBA house</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <img src="/static/definition_of_suvirr.png" alt="Logo" class="hero-logo">

    <div class="player-page-header">
        <a class="back-btn" id="back-btn" href="/">← Back</a>
        <img id="player-headshot" src="" alt="Player Headshot">
        <div class="player-title-block">
            <h2 id="player-name">Loading...</h2>
            <p id="player-meta">—</p>
            <span id="player-jersey" class="jersey-badge">—</span>
        </div>
        <div class="bio-grid" id="bio-grid">
            <div class="bio-card"><span class="bio-label">Height</span><span class="bio-value" id="bio-height">—</span></div>
            <div class="bio-card"><span class="bio-label">Weight</span><span class="bio-value" id="bio-weight">—</span></div>
            <div class="bio-card"><span class="bio-label">Country</span><span class="bio-value" id="bio-country">—</span></div>
            <div class="bio-card"><span class="bio-label">Experience</span><span class="bio-value" id="bio-experience">—</span></div>
        </div>
    </div>

    <div class="player-content">

        <!-- Loading spinner -->
        <div id="career-loading" class="page-loading"></div>

        <!-- Career stats table -->
        <div id="career-section" style="display:none;">
            <h3 class="section-title">Career Stats</h3>
            <div class="career-table-container">
                <table class="career-table">
                    <thead>
                        <tr>
                            <th>Season</th>
                            <th>Team</th>
                            <th>GP</th>
                            <th>MIN</th>
                            <th>PTS</th>
                            <th>REB</th>
                            <th>AST</th>
                            <th>STL</th>
                            <th>BLK</th>
                            <th>FG%</th>
                            <th>3P%</th>
                            <th>FT%</th>
                            <th>TOV</th>
                        </tr>
                    </thead>
                    <tbody id="career-rows"></tbody>
                </table>
            </div>
        </div>

        <!-- Recent game log -->
        <div id="gamelog-section" style="display:none;">
            <h3 class="section-title">Recent Games</h3>
            <div class="career-table-container">
                <table class="career-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Matchup</th>
                            <th>W/L</th>
                            <th>MIN</th>
                            <th>PTS</th>
                            <th>REB</th>
                            <th>AST</th>
                            <th>STL</th>
                            <th>BLK</th>
                            <th>FG%</th>
                            <th>+/-</th>
                        </tr>
                    </thead>
                    <tbody id="gamelog-rows"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="/static/player.js"></script>
</body>
</html>
